version: '3.8'

services:
  # AI Gateway - External facing service
  ai-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: ai-gateway
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - API_KEYS=${API_KEYS:-dev-key-1,dev-key-2}
      - LLM_SERVICE_URL=http://llm-service:3001
      - RAG_SERVICE_URL=http://rag-service:3002
      - SENTIMENT_SERVICE_URL=http://sentiment-service:3003
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - external
      - internal
    depends_on:
      - llm-service
      - rag-service
      - sentiment-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # LLM Service - Internal only
  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile
    container_name: llm-service
    expose:
      - "3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - MODEL_NAME=${MODEL_NAME:-PhoGPT-4B-Chat}
      - MODEL_DEVICE=${MODEL_DEVICE:-cpu}
      - MAX_CONCURRENCY=${LLM_MAX_CONCURRENCY:-5}
      - MAX_QUEUE_SIZE=${LLM_MAX_QUEUE_SIZE:-20}
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # RAG Service - Internal only
  rag-service:
    build:
      context: .
      dockerfile: services/rag-service/Dockerfile
    container_name: rag-service
    expose:
      - "3002"
    environment:
      - PORT=3002
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - CHROMADB_URL=http://chromadb:8000
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    depends_on:
      - redis
      - chromadb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Sentiment Service - Internal only
  sentiment-service:
    build:
      context: .
      dockerfile: services/sentiment-service/Dockerfile
    container_name: sentiment-service
    expose:
      - "3003"
    environment:
      - PORT=3003
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis - Internal only
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    expose:
      - "6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB - Internal only
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-chromadb
    expose:
      - "8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=${CHROMA_TELEMETRY:-FALSE}
    volumes:
      - chromadb-data:/chroma/chroma
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  # External network - accessible from host and other compose projects
  external:
    name: socialcue-external
    external: true
  
  # Internal network - isolated, no host access
  internal:
    driver: bridge
    internal: true

volumes:
  redis-data:
    driver: local
  chromadb-data:
    driver: local
